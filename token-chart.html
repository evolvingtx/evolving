<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token & Reward Chart</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark-bg: #0f0e1f;
      --card-bg: #1a1838;
      --card-border: #3d2e7a;
      --purple: #7c5ceb;
      --purple-light: #9b88d4;
      --text-white: #ffffff;
      --text-light: #a8a0c1;
      --accent-yellow: #ffd700;
      --accent-green: #4ade80;
      --reward-gold: #f59e0b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Fredoka', sans-serif;
      background: var(--dark-bg);
      color: var(--text-white);
      min-height: 100vh;
    }

    nav {
      background: rgba(26, 24, 56, 0.8);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
    }

    .nav-title {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 1.5rem;
      transition: color 0.2s;
    }

    .nav-btn:hover {
      color: var(--purple-light);
    }

    main {
      padding: 1.5rem 1rem;
      max-width: 700px;
      margin: 0 auto;
    }

    /* PIN */
    .pin-screen {
      text-align: center;
      padding: 3rem 1rem;
    }

    .pin-title {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .pin-subtitle {
      color: var(--text-light);
      margin-bottom: 2rem;
    }

    .pin-display {
      font-size: 2.5rem;
      letter-spacing: 0.8rem;
      color: var(--accent-yellow);
      margin: 2rem 0;
      font-weight: 700;
    }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
      margin: 2rem 0;
    }

    .pin-key {
      padding: 1.2rem;
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      color: var(--text-white);
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Fredoka', sans-serif;
    }

    .pin-key:hover {
      background: var(--purple);
      border-color: var(--purple);
    }

    .pin-delete {
      grid-column: 1 / 4;
      background: #ef4444;
      border-color: #dc2626;
    }

    .pin-error {
      color: #ff6b6b;
      margin-bottom: 1rem;
    }

    /* CHILD VIEW */
    .title-section {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .mission-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, #ffd700, #ff69b4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-card {
      background: linear-gradient(135deg, var(--card-bg), rgba(124, 92, 235, 0.1));
      border: 2px solid var(--card-border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .progress-count {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-yellow);
      text-align: right;
      margin-bottom: 1rem;
    }

    .progress-bar-container {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      height: 16px;
      overflow: hidden;
      margin-bottom: 0.8rem;
    }

    .progress-bar {
      background: linear-gradient(90deg, var(--purple), var(--accent-yellow));
      height: 100%;
      border-radius: 12px;
      transition: width 0.3s;
    }

    .progress-text {
      text-align: right;
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 1.5rem 0 1rem;
    }

    .chore-card {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 14px;
      padding: 1.2rem;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .chore-checkbox {
      width: 28px;
      height: 28px;
      border: 2px solid var(--card-border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .chore-checkbox.checked {
      background: var(--purple);
      border-color: var(--purple);
    }

    .chore-emoji {
      font-size: 1.8rem;
      flex-shrink: 0;
    }

    .chore-info {
      flex: 1;
    }

    .chore-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .chore-subtitle {
      font-size: 0.8rem;
      color: var(--text-light);
    }

    .chore-value {
      background: var(--purple);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .reward-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .reward-card {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 14px;
      padding: 1.2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reward-emoji {
      font-size: 2.5rem;
      margin-bottom: 0.8rem;
    }

    .reward-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }

    .reward-cost {
      background: var(--reward-gold);
      color: #000;
      padding: 0.6rem;
      border-radius: 8px;
      font-weight: 700;
    }

    .reward-status {
      font-size: 0.7rem;
      color: var(--text-light);
      margin-top: 0.6rem;
    }

    /* ADMIN PANEL */
    .admin-container {
      max-width: 100%;
    }

    .admin-section {
      background: var(--card-bg);
      border: 2px solid var(--card-border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .admin-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-yellow);
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      color: var(--text-light);
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    input, textarea {
      background: var(--dark-bg);
      border: 2px solid var(--card-border);
      color: var(--text-white);
      padding: 0.8rem;
      border-radius: 8px;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.95rem;
      width: 100%;
    }

    input:focus {
      outline: none;
      border-color: var(--purple);
    }

    .day-selector {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin: 0.5rem 0 1rem;
    }

    .day-btn {
      padding: 0.6rem;
      background: var(--dark-bg);
      border: 2px solid var(--card-border);
      color: var(--text-light);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .day-btn.selected {
      background: var(--purple);
      border-color: var(--purple);
      color: white;
    }

    .btn {
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-family: 'Fredoka', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--purple);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      background: var(--purple-light);
    }

    .btn-secondary {
      background: var(--dark-bg);
      border: 2px solid var(--card-border);
      color: var(--text-light);
      width: 100%;
      margin-top: 0.8rem;
    }

    .btn-secondary:hover {
      border-color: var(--purple);
    }

    .btn-group {
      display: flex;
      gap: 0.8rem;
    }

    .btn-group .btn {
      flex: 1;
      margin-top: 0;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .item {
      background: var(--dark-bg);
      border: 1px solid var(--card-border);
      padding: 0.8rem;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-info {
      flex: 1;
    }

    .item-name {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .item-meta {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 0.2rem;
    }

    .item-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-edit {
      background: var(--purple);
      color: white;
    }

    .btn-delete {
      background: #ef4444;
      color: white;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-light);
      font-size: 0.8rem;
    }

    @media (max-width: 480px) {
      .reward-grid {
        grid-template-columns: 1fr;
      }

      .day-selector {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-title">reward-chart</div>
  <div class="nav-menu">
    <button class="nav-btn" id="settingsBtn" onclick="goToAdmin()" title="Settings">⚙️</button>
  </div>
</nav>

<main id="app"></main>

<footer>
  © 2024 Evolving Therapy & Wellness
</footer>

<script>
const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

function getTodayDateString() {
  const today = new Date();
  const dayName = DAYS[today.getDay()];
  const month = String(today.getMonth() + 1).padStart(2, '0');
  const date = String(today.getDate()).padStart(2, '0');
  const year = today.getFullYear();
  return `${dayName}, ${month}/${date}/${year}`;
}

const state = {
  view: 'pin', // 'pin' | 'child' | 'admin'
  pinValue: '',
  pinError: '',
  editingChoreId: null,
  editingRewardId: null,
  db: {
    pin: '1234',
    tokens: 0,
    chores: [
      { id: 1, name: 'Brush teeth', emoji: '🪥', value: 2, days: [0,1,2,3,4,5,6] },
      { id: 2, name: 'Make bed', emoji: '🛏️', value: 3, days: [1,2,3,4,5] },
      { id: 3, name: 'Take out trash', emoji: '🗑️', value: 5, days: [2,5] },
    ],
    rewards: [
      { id: 1, name: '30 min screen time', emoji: '📱', cost: 10 },
      { id: 2, name: 'Special snack', emoji: '🍪', cost: 5 },
    ],
    completedToday: {},
  }
};

function loadDB() {
  const saved = localStorage.getItem('tokenChartDB');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      Object.assign(state.db, data);
    } catch (e) {
      console.error('Load error:', e);
    }
  }
}

function saveDB() {
  localStorage.setItem('tokenChartDB', JSON.stringify(state.db));
}

// PIN
function handlePinKey(key) {
  if (key === '⌫') {
    state.pinValue = state.pinValue.slice(0, -1);
    state.pinError = '';
  } else if (state.pinValue.length < 4) {
    state.pinValue += key;
    if (state.pinValue.length === 4) {
      if (state.pinValue === state.db.pin) {
        state.view = 'child';
        state.pinValue = '';
        state.pinError = '';
      } else {
        state.pinError = 'Wrong PIN. Try again.';
        state.pinValue = '';
      }
    }
  }
  render();
}

// CHILD VIEW
function getTodayChores() {
  const today = new Date().getDay();
  return state.db.chores.filter(c => c.days && Array.isArray(c.days) && c.days.includes(today));
}

function getLowestRewardCost() {
  if (!state.db.rewards || state.db.rewards.length === 0) return 10;
  const costs = state.db.rewards.filter(r => r && r.cost).map(r => r.cost);
  return costs.length > 0 ? Math.min(...costs) : 10;
}

function toggleChore(choreId) {
  const chore = state.db.chores.find(c => c.id === choreId);
  if (!chore) return;

  const wasCompleted = state.db.completedToday[choreId];
  
  if (wasCompleted) {
    // Unchecking - remove tokens
    state.db.tokens -= chore.value;
  } else {
    // Checking - add tokens
    state.db.tokens += chore.value;
  }
  
  state.db.completedToday[choreId] = !wasCompleted;
  saveDB();
  render();
}

function redeemReward(rewardId) {
  const reward = state.db.rewards.find(r => r.id === rewardId);
  if (reward && state.db.tokens >= reward.cost) {
    state.db.tokens -= reward.cost;
    saveDB();
    alert(`🎉 ${reward.emoji} ${reward.name} unlocked!`);
    render();
  }
}

// ADMIN
function goToAdmin() {
  state.view = 'admin';
  state.editingChoreId = null;
  state.editingRewardId = null;
  render();
}

function backToChild() {
  state.view = 'child';
  render();
}

function saveChore(e) {
  e.preventDefault();
  const name = document.getElementById('choreName')?.value;
  const emoji = document.getElementById('choreEmoji')?.value;
  const value = parseInt(document.getElementById('choreValue')?.value);
  const days = Array.from(document.querySelectorAll('.day-btn.selected')).map(el => parseInt(el.dataset.day));

  if (!name || !emoji || !value || days.length === 0) {
    alert('Fill all fields and select at least one day');
    return;
  }

  if (state.editingChoreId) {
    const chore = state.db.chores.find(c => c.id === state.editingChoreId);
    if (chore) {
      chore.name = name;
      chore.emoji = emoji;
      chore.value = value;
      chore.days = days;
    }
    state.editingChoreId = null;
  } else {
    const id = Math.max(...state.db.chores.map(c => c.id), 0) + 1;
    state.db.chores.push({ id, name, emoji, value, days });
  }

  saveDB();
  document.getElementById('choreForm').reset();
  render();
}

function editChore(choreId) {
  state.editingChoreId = choreId;
  render();
}

function deleteChore(choreId) {
  if (confirm('Delete this chore?')) {
    state.db.chores = state.db.chores.filter(c => c.id !== choreId);
    saveDB();
    render();
  }
}

function saveReward(e) {
  e.preventDefault();
  const name = document.getElementById('rewardName')?.value;
  const emoji = document.getElementById('rewardEmoji')?.value;
  const cost = parseInt(document.getElementById('rewardCost')?.value);

  if (!name || !emoji || !cost) {
    alert('Fill all fields');
    return;
  }

  if (state.editingRewardId) {
    const reward = state.db.rewards.find(r => r.id === state.editingRewardId);
    Object.assign(reward, { name, emoji, cost });
    state.editingRewardId = null;
  } else {
    const id = Math.max(...state.db.rewards.map(r => r.id), 0) + 1;
    state.db.rewards.push({ id, name, emoji, cost });
  }

  saveDB();
  document.getElementById('rewardForm').reset();
  render();
}

function editReward(rewardId) {
  state.editingRewardId = rewardId;
  render();
}

function deleteReward(rewardId) {
  if (confirm('Delete this reward?')) {
    state.db.rewards = state.db.rewards.filter(r => r.id !== rewardId);
    saveDB();
    render();
  }
}

function addTokens() {
  const amount = parseInt(document.getElementById('tokenAmount')?.value);
  if (amount && amount > 0) {
    state.db.tokens += amount;
    saveDB();
    document.getElementById('tokenAmount').value = '';
    render();
  }
}

function changePIN() {
  const newPin = document.getElementById('newPin')?.value;
  if (newPin && newPin.length === 4) {
    state.db.pin = newPin;
    saveDB();
    document.getElementById('newPin').value = '';
    alert('PIN updated!');
  } else {
    alert('PIN must be 4 digits');
  }
}

function toggleDay(dayNum) {
  const btn = document.querySelector(`.day-btn[data-day="${dayNum}"]`);
  btn.classList.toggle('selected');
}

// RENDER
function render() {
  const app = document.getElementById('app');

  if (state.view === 'pin') {
    app.innerHTML = `
      <div class="pin-screen">
        <div class="pin-title">🔐 Unlock</div>
        <div class="pin-subtitle">Enter PIN to continue</div>
        <div class="pin-display">${'●'.repeat(state.pinValue.length)}${'○'.repeat(4 - state.pinValue.length)}</div>
        ${state.pinError ? `<div class="pin-error">${state.pinError}</div>` : ''}
        <div class="pin-keypad">
          ${[1,2,3,4,5,6,7,8,9].map(n => `<button class="pin-key" onclick="handlePinKey('${n}')">${n}</button>`).join('')}
          <button class="pin-key" onclick="handlePinKey('0')">0</button>
          <button class="pin-delete" onclick="handlePinKey('⌫')">⌫</button>
        </div>
      </div>
    `;
    return;
  }

  if (state.view === 'child') {
    const todayChores = getTodayChores();
    const lowestReward = getLowestRewardCost();
    const progress = Math.min(100, (state.db.tokens / lowestReward) * 100);

    app.innerHTML = `
      <div class="title-section">
        <div style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 0.8rem;">${getTodayDateString()}</div>
        <div class="mission-title">Mission: Token Launch! 🚀</div>
      </div>

      <div class="progress-card">
        <div class="progress-count">🌙 ${state.db.tokens}</div>
        <div class="progress-bar-container">
          <div class="progress-bar" style="width: ${progress}%"></div>
        </div>
        <div class="progress-text">${Math.max(0, lowestReward - state.db.tokens)} more to unlock rewards!</div>
      </div>

      <div class="section-title">⭐ Today's Missions</div>
      ${todayChores.length === 0 ? '<p style="color: var(--text-light);">No missions today!</p>' : ''}
      ${todayChores.map(chore => `
        <div class="chore-card">
          <div class="chore-emoji">${chore.emoji}</div>
          <div class="chore-info">
            <div class="chore-name">${chore.name}</div>
            <div class="chore-subtitle">Super skill challenge!</div>
          </div>
          <div class="chore-checkbox ${state.db.completedToday[chore.id] ? 'checked' : ''}" onclick="toggleChore(${chore.id})">
            ${state.db.completedToday[chore.id] ? '✓' : ''}
          </div>
          <div class="chore-value">🌙 ${chore.value}</div>
        </div>
      `).join('')}

      <div class="section-title">🎁 Rewards Unlocked</div>
      <div class="reward-grid">
        ${state.db.rewards.map(reward => `
          <div class="reward-card" onclick="redeemReward(${reward.id})">
            <div class="reward-emoji">${reward.emoji}</div>
            <div class="reward-name">${reward.name}</div>
            <div class="reward-cost">🌙 ${reward.cost}</div>
            <div class="reward-status">${state.db.tokens >= reward.cost ? '✓ Ready!' : `Need ${reward.cost - state.db.tokens} more`}</div>
          </div>
        `).join('')}
      </div>
    `;
    return;
  }

  if (state.view === 'admin') {
    const editingChore = state.editingChoreId ? state.db.chores.find(c => c.id === state.editingChoreId) : null;
    const editingReward = state.editingRewardId ? state.db.rewards.find(r => r.id === state.editingRewardId) : null;

    app.innerHTML = `
      <div class="admin-container">
        <h1 style="color: var(--accent-yellow); margin-bottom: 1.5rem;">⚙️ Parent Controls</h1>

        <!-- ADD/EDIT CHORE -->
        <div class="admin-section">
          <div class="admin-title">${state.editingChoreId ? '✏️ Edit Chore' : '➕ Add Chore'}</div>
          <form id="choreForm" onsubmit="saveChore(event)">
            <div class="form-group">
              <label>Emoji</label>
              <input type="text" id="choreEmoji" maxlength="2" placeholder="🪥" value="${editingChore?.emoji || ''}" required>
            </div>
            <div class="form-group">
              <label>Chore Name</label>
              <input type="text" id="choreName" placeholder="Brush teeth" value="${editingChore?.name || ''}" required>
            </div>
            <div class="form-group">
              <label>Tokens Worth</label>
              <input type="number" id="choreValue" min="1" placeholder="2" value="${editingChore?.value || ''}" required>
            </div>
            <div class="form-group">
              <label>Select Days</label>
              <div class="day-selector">
                ${DAYS.map((day, i) => `
                  <button type="button" class="day-btn ${editingChore?.days.includes(i) ? 'selected' : ''}" data-day="${i}" onclick="toggleDay(${i})" style="font-size: 0.75rem;">
                    ${day.slice(0, 3)}
                  </button>
                `).join('')}
              </div>
            </div>
            <button type="submit" class="btn btn-primary">${state.editingChoreId ? 'Update Chore' : 'Add Chore'}</button>
            ${state.editingChoreId ? `<button type="button" class="btn btn-secondary" onclick="state.editingChoreId = null; render()">Cancel</button>` : ''}
          </form>
        </div>

        <!-- CHORES LIST -->
        <div class="admin-section">
          <div class="admin-title">📋 Your Chores</div>
          <div class="item-list">
            ${state.db.chores.map(chore => `
              <div class="item">
                <div class="item-info">
                  <div class="item-name">${chore.emoji} ${chore.name}</div>
                  <div class="item-meta">🌙 ${chore.value} tokens • ${chore.days.map(d => DAYS[d]).join(', ')}</div>
                </div>
                <div class="item-actions">
                  <button class="btn-sm btn-edit" onclick="editChore(${chore.id})">Edit</button>
                  <button class="btn-sm btn-delete" onclick="deleteChore(${chore.id})">Delete</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- ADD/EDIT REWARD -->
        <div class="admin-section">
          <div class="admin-title">${state.editingRewardId ? '✏️ Edit Reward' : '➕ Add Reward'}</div>
          <form id="rewardForm" onsubmit="saveReward(event)">
            <div class="form-group">
              <label>Emoji</label>
              <input type="text" id="rewardEmoji" maxlength="2" placeholder="📱" value="${editingReward?.emoji || ''}" required>
            </div>
            <div class="form-group">
              <label>Reward Name</label>
              <input type="text" id="rewardName" placeholder="30 min screen time" value="${editingReward?.name || ''}" required>
            </div>
            <div class="form-group">
              <label>Tokens Cost</label>
              <input type="number" id="rewardCost" min="1" placeholder="10" value="${editingReward?.cost || ''}" required>
            </div>
            <button type="submit" class="btn btn-primary">${state.editingRewardId ? 'Update Reward' : 'Add Reward'}</button>
            ${state.editingRewardId ? `<button type="button" class="btn btn-secondary" onclick="state.editingRewardId = null; render()">Cancel</button>` : ''}
          </form>
        </div>

        <!-- REWARDS LIST -->
        <div class="admin-section">
          <div class="admin-title">🎁 Your Rewards</div>
          <div class="item-list">
            ${state.db.rewards.map(reward => `
              <div class="item">
                <div class="item-info">
                  <div class="item-name">${reward.emoji} ${reward.name}</div>
                  <div class="item-meta">🌙 ${reward.cost} tokens</div>
                </div>
                <div class="item-actions">
                  <button class="btn-sm btn-edit" onclick="editReward(${reward.id})">Edit</button>
                  <button class="btn-sm btn-delete" onclick="deleteReward(${reward.id})">Delete</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>

        <!-- QUICK CONTROLS -->
        <div class="admin-section">
          <div class="admin-title">⚡ Quick Controls</div>
          <div class="form-group">
            <label>Add Tokens to Account</label>
            <div style="display: flex; gap: 0.5rem;">
              <input type="number" id="tokenAmount" min="1" placeholder="Amount" style="flex: 1;">
              <button type="button" class="btn btn-primary" onclick="addTokens()" style="flex: 0 0 auto; width: auto;">Add</button>
            </div>
          </div>
        </div>

        <!-- CHANGE PIN -->
        <div class="admin-section">
          <div class="admin-title">🔐 Change PIN</div>
          <div class="form-group">
            <label>New 4-digit PIN</label>
            <div style="display: flex; gap: 0.5rem;">
              <input type="text" id="newPin" maxlength="4" placeholder="1234" style="flex: 1;">
              <button type="button" class="btn btn-primary" onclick="changePIN()" style="flex: 0 0 auto; width: auto;">Update</button>
            </div>
          </div>
        </div>

        <!-- BACK BUTTON -->
        <button class="btn btn-secondary" onclick="backToChild()" style="width: 100%; margin-top: 1rem;">Back to Chart</button>
      </div>
    `;
    return;
  }
}

loadDB();
render();
</script>

</body>
</html>
